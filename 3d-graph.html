<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Rating | 3D球形拓扑图</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/3d-graph.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="graph-page">
    <div class="bg-pattern"></div>
    
    <header class="graph-header">
        <a href="index.html" class="back-home">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M10 4L4 10L10 16M4 10H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>返回首页</span>
        </a>
        <div class="header-title">
            <h1>AI模型3D拓扑图</h1>
            <p>拖拽旋转 · 滚轮缩放 · 点击查看详情</p>
        </div>
    </header>

    <div id="3d-graph" class="graph-container">
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#00ff88;">加载中...</div>
    </div>

    <div class="sidebar-toggle" id="sidebar-toggle">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <nav class="sidebar-nav">
                <button class="nav-item active" data-panel="experts">
                    <span class="nav-icon">👤</span>
                    <span>评测专家</span>
                </button>
                <button class="nav-item" data-panel="tools">
                    <span class="nav-icon">🔧</span>
                    <span>评测工具</span>
                </button>
                <button class="nav-item" data-panel="reports">
                    <span class="nav-icon">📊</span>
                    <span>评测报告</span>
                </button>
                <button class="nav-item" data-panel="trends">
                    <span class="nav-icon">📈</span>
                    <span>趋势分析</span>
                </button>
            </nav>

            <div class="sidebar-panels">
                <div class="panel-item active" id="panel-experts">
                    <h3>评测专家</h3>
                    <div class="expert-list" id="expert-list"></div>
                </div>
                <div class="panel-item" id="panel-tools">
                    <h3>评测工具</h3>
                    <div class="tool-list" id="tool-list"></div>
                </div>
                <div class="panel-item" id="panel-reports">
                    <h3>评测报告</h3>
                    <div class="report-list" id="report-list"></div>
                </div>
                <div class="panel-item" id="panel-trends">
                    <h3>趋势分析</h3>
                    <div class="trend-chart" id="trend-chart"></div>
                </div>
            </div>
        </div>
    </aside>

    <div class="node-popup" id="node-popup">
        <button class="popup-close" id="popup-close">×</button>
        <div class="popup-content">
            <div class="popup-header">
                <div class="popup-icon" id="popup-icon"></div>
                <div class="popup-title">
                    <h2 id="popup-model-name">模型名称</h2>
                    <span class="popup-company" id="popup-company">公司</span>
                </div>
                <div class="popup-score">
                    <span class="score-value" id="popup-score">95</span>
                    <span class="score-label">综合分</span>
                </div>
            </div>
            <div class="popup-body">
                <h3>评测体系热度排序</h3>
                <div class="benchmark-list" id="benchmark-list"></div>
            </div>
        </div>
    </div>

    <div class="graph-controls">
        <button class="control-btn" id="zoom-in" title="放大">+</button>
        <button class="control-btn" id="zoom-out" title="缩小">−</button>
        <button class="control-btn" id="reset-view" title="重置">⟲</button>
    </div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/d3-force/dist/d3-force.min.js"></script>
    <script src="assets/js/3d-graph.js"></script>
</body>
</html>
