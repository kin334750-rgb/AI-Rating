<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Rating | AI评测信息实时收集平台</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-pattern"></div>
    
    <header class="site-header">
        <div class="header-content">
            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="18" stroke="url(#logoGradient)" stroke-width="2"/>
                        <circle cx="20" cy="20" r="8" fill="url(#logoGradient)"/>
                        <circle cx="20" cy="20" r="3" fill="#0a0a0f"/>
                        <defs>
                            <linearGradient id="logoGradient" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#00ff88"/>
                                <stop offset="100%" stop-color="#00d4ff"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>AI-Rating</h1>
                    <p class="tagline">AI评测信息实时收集平台</p>
                </div>
            </div>
            <div class="header-desc">
                <span class="badge">多源实时抓取</span>
                <span class="badge">综合能力打分</span>
                <span class="badge">行业趋势分析</span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="hero-stats">
            <div class="stat-card">
                <div class="stat-icon">🟢</div>
                <div class="stat-info">
                    <span class="stat-value" id="total-models">28</span>
                    <span class="stat-label">追踪模型</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📡</div>
                <div class="stat-info">
                    <span class="stat-value" id="total-sources">12</span>
                    <span class="stat-label">信息源</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <span class="stat-value" id="total-benchmarks">18</span>
                    <span class="stat-label">评测基准</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏱️</div>
                <div class="stat-info">
                    <span class="stat-value" id="last-update">--:--</span>
                    <span class="stat-label">最后更新</span>
                </div>
            </div>
        </section>

        <section class="main-grid">
            <div class="left-panel">
                <div class="panel-header">
                    <h2><span class="pulse"></span>实时信息源</h2>
                    <div class="panel-tabs">
                        <button class="tab-btn active" data-source="all">全部</button>
                        <button class="tab-btn" data-source="bilibili">B站</button>
                        <button class="tab-btn" data-source="github">GitHub</button>
                        <button class="tab-btn" data-source="twitter">X</button>
                        <button class="tab-btn" data-source="zhihu">知乎</button>
                    </div>
                </div>
                <div class="feed-container">
                    <div class="feed-content" id="feed-content"></div>
                </div>
            </div>

            <div class="right-panel">
                <div class="panel-header">
                    <h2>🏆 AI模型综合评分</h2>
                    <span class="update-time">实时更新</span>
                </div>
                <div class="ranking-container">
                    <div class="ranking-list" id="ranking-list"></div>
                </div>
            </div>
        </section>

        <section class="cta-section">
            <a href="3d-graph.html" class="cta-button">
                <span class="cta-text">Click here 了解更多</span>
                <span class="cta-arrow">→</span>
            </a>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p>AI-Rating © 2026 | 数据来源：B站、GitHub、X、知乎、arXiv</p>
            <p class="footer-note">本页面数据仅供演示，实际信息需配置API</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
